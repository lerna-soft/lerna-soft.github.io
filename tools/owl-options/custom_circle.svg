<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
  <!-- Cejas + cabeza superior (forma sólida tipo "M" invertida con orejas) -->
  <path d="M 18 16 L 22 6 L 26 16 L 32 22 L 38 16 L 42 6 L 46 16 Z" fill="currentColor"/>

  <!-- Marco facial: continúa desde las cejas, baja por las mejillas y forma el mentón -->
  <path d="M 18 16 L 18 32 Q 20 40 32 40 Q 44 40 46 32 L 46 16"/>

  <!-- Ojos outline + pupilas sólidas -->
  <circle cx="25" cy="24" r="3.5"/>
  <circle cx="39" cy="24" r="3.5"/>
  <circle cx="25" cy="24" r="1.6" fill="currentColor"/>
  <circle cx="39" cy="24" r="1.6" fill="currentColor"/>

  <!-- Pico (V pequeña) -->
  <path d="M 30 30 L 32 34 L 34 30"/>

  <!-- Cuerpo: gota más estrecha que la cabeza -->
  <path d="M 24 40 Q 18 46 22 54 L 42 54 Q 46 46 40 40"/>

  <!-- División central del pecho -->
  <path d="M 32 40 L 32 54"/>

  <!-- Pies en V -->
  <path d="M 28 54 L 32 60 L 36 54"/>
</svg>
